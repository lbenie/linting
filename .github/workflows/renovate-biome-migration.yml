name: Run Biome Migration on Renovate PRs

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"

jobs:
  biome-migration:
    # Only run on Renovate PRs that update @biomejs/biome
    if: |
      github.actor == 'renovate[bot]' &&
      contains(github.event.pull_request.title, '@biomejs/biome')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Run Biome migration
        run: npx @biomejs/biome migrate --write

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add biome.json biome.jsonc
          git diff --staged --quiet || git commit -m "chore: run biome migrate"

      - name: Push changes
        run: git push
